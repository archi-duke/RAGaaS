server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # MF remoteEntry — 셸(다른 origin)이 로드하므로 CORS 허용 + 캐시 금지 (계약 01 §5)
    # (exact match 라 아래 정적자산 regex 의 1y 캐시보다 우선)
    location = /remoteEntry.js {
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "no-store" always;
    }

    # 런타임 env — entrypoint 가 기동 시 재생성하므로 캐시 금지 (계약 05 §5)
    location = /env.js {
        add_header Cache-Control "no-store" always;
    }

    # Ingest Service API proxy (/ingest-api/ → ingest-service:8001/api/v2/)
    location /ingest-api/ {
        proxy_pass http://ingest-service:8001/api/v2/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # WebSocket proxy (must be before /api/ to take priority)
    location /api/v2/ws/ {
        proxy_pass http://backend:8000/api/v2/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # Backend API proxy
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 100M;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets — MF chunk 는 셸(다른 origin)이 로드할 수 있어 CORS 허용 (계약 01 §5)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin * always;
    }
}
