version: '3.8'

services:
  etcd:
    container_name: ragaas-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./data/etcd:/etcd
    command: etcd -advertise-client-urls http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    ports:
      - "2379:2379"

  minio:
    container_name: ragaas-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    command: minio server /data --console-address ":9001"

  milvus-standalone:
    container_name: ragaas-milvus
    image: milvusdb/milvus:v2.3.1
    command: ["milvus", "run", "standalone"]
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - "etcd"
      - "minio"

  fuseki:
    container_name: ragaas-fuseki
    image: stain/jena-fuseki:4.9.0
    ports:
      - "3030:3030"
    volumes:
      - ./data/fuseki:/fuseki
    environment:
      - FUSEKI_PASSWORD=password

  neo4j:
    container_name: ragaas-neo4j
    image: neo4j:5.12.0
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./data/neo4j/data:/data
    environment:
      - NEO4J_AUTH=neo4j/password

  mongo:
    container_name: ragaas-mongo
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongodb:/data/db

  redis:
    container_name: ragaas-redis
    image: redis:7.0-alpine
    ports:
      - "6379:6379"
