# ============================================================================
# RAGaaS Application Stack (앱 전용)
#
# 인프라(MongoDB/Milvus/Fuseki/Neo4j/Redis)는 GoJIRA와 공용하는 shared-infra
# 스택(개발 환경: D:\Works\shared-infra)에서 제공된다.
# 반드시 shared-infra 를 먼저 기동할 것 — shared-net 네트워크와
# shared-* 컨테이너들이 그때 생성된다.
#
#   cd ../shared-infra && docker compose up -d   # 1. 인프라
#   docker compose up -d                          # 2. 앱
# ============================================================================

services:
  backend:
    container_name: ragaas-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - MILVUS_HOST=shared-milvus
      - MILVUS_PORT=19530
      - FUSEKI_URL=http://shared-fuseki:3030
      - NEO4J_URI=bolt://shared-neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - MONGO_URI=mongodb://ragaas_app:${RAGAAS_MONGO_PASSWORD:-ragaas-dev-pass}@shared-mongo:27017/ragaas?authSource=ragaas
      - MONGO_DB=ragaas
      - INGEST_SERVICE_URL=http://ingest-service:8001
      - SHARED_STORAGE_PATH=/data/uploads
      - CALLBACK_BASE_URL=http://backend:8000
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      # 플랫폼 신원 확정 (계약 05 §6) — SSO/서비스토큰/dev 폴백
      - USE_SSO=${USE_SSO:-false}
      - SSO_INTROSPECT_URL=${SSO_INTROSPECT_URL:-}
      - SSO_INSECURE_TLS=${SSO_INSECURE_TLS:-false}
      - SERVICE_TOKEN=${SERVICE_TOKEN:-}
      - DEV_USER=${DEV_USER:-dev}
    volumes:
      - ./data/uploads:/data/uploads
      - backend-data:/app/data
    ports:
      - "8000:8000"
    networks:
      - default
      - shared-net
    restart: unless-stopped

  ingest-service:
    container_name: ragaas-ingest
    build:
      context: ./ingest_service
      dockerfile: Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://shared-redis:6379/0
      - MILVUS_HOST=shared-milvus
      - MILVUS_PORT=19530
      - NEO4J_URI=bolt://shared-neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - FUSEKI_URL=http://shared-fuseki:3030
      - SHARED_STORAGE_PATH=/data/uploads
      - MAIN_BACKEND_URL=http://backend:8000
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      # 플랫폼 신원 확정 (계약 05 §6) — backend 와 동일 SERVICE_TOKEN 공유
      - USE_SSO=${USE_SSO:-false}
      - SSO_INTROSPECT_URL=${SSO_INTROSPECT_URL:-}
      - SSO_INSECURE_TLS=${SSO_INSECURE_TLS:-false}
      - SERVICE_TOKEN=${SERVICE_TOKEN:-}
      - DEV_USER=${DEV_USER:-dev}
    volumes:
      - ./data/uploads:/data/uploads
    ports:
      - "8001:8001"
    networks:
      - default
      - shared-net
    restart: unless-stopped

  frontend:
    container_name: ragaas-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - TELERIK_LICENSE=${TELERIK_LICENSE}
    environment:
      # 런타임 env → env.js (계약 05 §5). 비우면 프론트는 상대경로 프록시 폴백
      - REACT_APP_RAGAAS_API=${REACT_APP_RAGAAS_API:-}
      - REACT_APP_RAGAAS_INGEST_API=${REACT_APP_RAGAAS_INGEST_API:-}
      - REACT_APP_USE_SSO=${USE_SSO:-false}
      - REACT_APP_SSO_URL=${REACT_APP_SSO_URL:-}
      - REACT_APP_DEV_USER=${DEV_USER:-dev}
    ports:
      - "80:80"
    depends_on:
      - backend
      - ingest-service
    networks:
      - default
      # 게이트웨이가 /ragaas/ → ragaas-frontend:80 으로 프록시 (갱신 통지 2026-07-06 변경 3)
      - shared-net
    restart: unless-stopped

volumes:
  backend-data:

networks:
  default:
    name: ragaas-app
  # 공유 인프라 및 GoJIRA 연계용 — shared-infra 스택이 생성
  shared-net:
    external: true
